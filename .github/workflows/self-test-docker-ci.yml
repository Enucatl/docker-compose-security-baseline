name: Self-Test Docker CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.image_name }}
    steps:
      - name: Compute lowercase GHCR image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

  docker:
    needs: prepare
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    uses: Enucatl/docker-compose-security-baseline/.github/workflows/docker-ci.yml@main
    with:
      image_name: ${{ needs.prepare.outputs.image_name }}
      context: .
      dockerfile: Dockerfile
      platforms: linux/amd64
      push: ${{ github.event_name != 'pull_request' }}
      fail_on_fs_findings: false
      fail_on_image_findings: false
    secrets: inherit
