services:
  hardened-tiny:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    memswap_limit: 128m
    pids_limit: 64

  hardened-small:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    memswap_limit: 256m
    pids_limit: 128

  hardened-medium:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 192

  hardened-large:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 256

  hardened-xlarge:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    memswap_limit: 2g
    pids_limit: 512

  hardened-xxlarge:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 3g
    memswap_limit: 3g
    pids_limit: 768

  hardened-no-limits:
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  limits-small:
    mem_limit: 256m
    memswap_limit: 256m
    pids_limit: 128

  limits-medium:
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 192

  limits-large:
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 256

  limits-xlarge:
    mem_limit: 2g
    memswap_limit: 2g
    pids_limit: 512

  limits-xxlarge:
    mem_limit: 3g
    memswap_limit: 3g
    pids_limit: 768

  chown-init-medium:
    extends:
      service: hardened-medium
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  chown-init-xlarge:
    extends:
      service: hardened-xlarge
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  postgres:
    extends:
      service: chown-init-medium

  mongo:
    extends:
      service: chown-init-medium

  vault:
    extends:
      service: hardened-large
    cap_add:
      - IPC_LOCK

  traefik-edge:
    extends:
      service: hardened-small
    cap_add:
      - NET_BIND_SERVICE

  root-chown-init:
    extends:
      service: hardened-small
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  setpcap-chown-init:
    extends:
      service: root-chown-init
    cap_add:
      - SETPCAP

  setpcap-chown-init-xlarge:
    extends:
      service: chown-init-xlarge
    cap_add:
      - SETPCAP

  ipc-lock-chown-init:
    extends:
      service: root-chown-init
    cap_add:
      - IPC_LOCK

  redis:
    extends:
      service: setpcap-chown-init

  readonly-small:
    extends:
      service: hardened-small
    read_only: true

  readonly-medium:
    extends:
      service: hardened-medium
    read_only: true
